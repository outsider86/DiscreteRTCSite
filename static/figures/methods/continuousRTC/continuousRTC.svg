    <text x="300" y="24" font-size="20" font-weight="bold"
          text-anchor="middle" fill="#333">RTC with Flow-Matching Head</text>

    <!-- Before Inference label -->
    <text x="55" y="58" font-size="14" font-weight="bold"
          text-anchor="middle" fill="#888">Before</text>
    <text x="55" y="76" font-size="14" font-weight="bold"
          text-anchor="middle" fill="#888">Inference</text>

    <!-- BEFORE chunk : 10 cells , d=2 green · 4 mixed · s=4 yellow -->
    <rect x="100" y="44" width="40" height="40" fill="#2e8b57" />
    <rect x="140" y="44" width="40" height="40" fill="#2e8b57" />
    <rect x="180" y="44" width="40" height="40" fill="#5a9e45" />
