       3 cols × 2 rows of 250×160 tiles with 10px gaps,
       content area x=10..770  y=10..330                        -->

  <!-- =========================================================== -->
  <!-- (1,1)-(1,2)  BIG CHUNKS panel  — 500×160                     -->
  <!-- =========================================================== -->
