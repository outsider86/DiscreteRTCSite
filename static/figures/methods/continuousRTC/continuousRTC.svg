  <!-- =========================================================== -->
  <!-- (2,1)  Panel (b)  — Fine-tuning Data   250×160              -->
  <!-- =========================================================== -->
  <g id="panel-b">
    <rect x="10" y="180" width="250" height="160" rx="8" fill="#fdf5e0"
          stroke="#aaa" stroke-width="1.2" />
    <text x="24" y="200" font-size="15" font-weight="bold"
          fill="#333">(b) Fine-tuning Required</text>

    <!-- Description above top chunk -->
    <text x="135" y="228" font-size="14" font-weight="bold"
          text-anchor="middle" fill="#333">Inconsistent Noise Pattern</text>

    <!-- Mixed chunk : 10 cells 22×22 , inpainting pattern , centred (x=25..245) -->
    <rect x="25"  y="238" width="22" height="22" fill="#2e8b57" />
    <rect x="47"  y="238" width="22" height="22" fill="#2e8b57" />
    <rect x="69"  y="238" width="22" height="22" fill="#e8d810" />
    <rect x="91"  y="238" width="22" height="22" fill="#e8d810" />
