  <!-- =========================================================== -->
  <!-- (2,2)  Panel (c)  — Guidance Weight   250×160                -->
  <!-- =========================================================== -->
  <g id="panel-c">
    <rect x="270" y="180" width="250" height="160" rx="8" fill="#fdf5e0"
          stroke="#aaa" stroke-width="1.2" />
    <text x="284" y="200" font-size="15" font-weight="bold" fill="#333">(c) Heuristic Guidance</text>

    <line x1="300" y1="318" x2="300" y2="218" stroke="#333" stroke-width="1.2"
          marker-end="url(#axisArrow)" />
    <line x1="300" y1="318" x2="505" y2="318" stroke="#333" stroke-width="1.2"
          marker-end="url(#axisArrow)" />

    <text x="293" y="268" font-size="12" font-weight="bold" fill="#333"
          text-anchor="middle" transform="rotate(-90, 293, 268)">Guidance Weight</text>
    <text x="402" y="336" font-size="12" font-weight="bold" fill="#333"
          text-anchor="middle">Action Index</text>

    <line x1="360" y1="228" x2="360" y2="318" stroke="#888"
          stroke-width="1" stroke-dasharray="4,3" />
    <line x1="440" y1="298" x2="440" y2="318" stroke="#888"
          stroke-width="1" stroke-dasharray="4,3" />

    <!-- Equations (stacked) , left-aligned at x=410 -->
    <g id="c-eq">
      <!-- W_i = c_i · (e^{c_i} - 1) / (e - 1) -->
      <text x="410" y="236" font-size="15" font-style="italic"
            text-anchor="start" fill="#333">W<tspan dy="3" font-size="11">i</tspan><tspan dy="-3"> = c</tspan><tspan dy="3" font-size="11">i</tspan></text>
      <text x="476" y="230" font-size="13" font-style="italic"
            text-anchor="middle" fill="#333">e<tspan dy="-4" font-size="10">c&#7522;</tspan><tspan dy="4"> &#8722; 1</tspan></text>
      <line x1="456" y1="234" x2="496" y2="234" stroke="#333" stroke-width="0.8" />
      <text x="476" y="247" font-size="13" font-style="italic"
            text-anchor="middle" fill="#333">e &#8722; 1</text>

      <!-- c_i = (H-s-i) / (H-s-d+1) -->
      <text x="410" y="270" font-size="14" font-style="italic"
            text-anchor="start" fill="#333">c<tspan dy="3" font-size="10">i</tspan><tspan dy="-3"> =</tspan></text>
      <text x="472" y="264" font-size="12" font-style="italic"
            text-anchor="middle" fill="#333">H &#8722; s &#8722; i</text>
      <line x1="437" y1="268" x2="507" y2="268" stroke="#333" stroke-width="0.8" />
      <text x="472" y="281" font-size="12" font-style="italic"
            text-anchor="middle" fill="#333">H &#8722; s &#8722; d + 1</text>
    </g>

    <!-- W(τ): 1 in first region · exp decay in intermediate · 0 in last region -->
    <path d="M 300,230 L 360,230
             C 372,230 374,316 440,318
             L 500,318"
          fill="none" stroke="#c9a11a" stroke-width="2" stroke-linecap="round" />
  </g>

