<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340"
     font-family="'Times New Roman', 'CMU Serif', Georgia, serif"
     font-weight="bold"
     style="background:white">
  <rect x="0" y="0" width="780" height="340" fill="white" />

  <defs>
    <marker id="arrowhead" markerWidth="7" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#888" />
    </marker>
    <marker id="arrowSub" markerWidth="7" markerHeight="5" refX="4" refY="2.5" orient="auto">
