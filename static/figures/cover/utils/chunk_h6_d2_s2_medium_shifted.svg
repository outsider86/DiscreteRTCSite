<?xml version="1.0" encoding="utf-8"?>
<!--
  Action chunk - tight setting H=6, d=2, s=2.  Shifted d=2 steps ahead.
  Layout: [2 green committed] | [C4,C5 mixed] | [2 all-yellow new tail]
  Geometry follows discreteRTC.svg : 40x40 cells, 3x3 tokens 12x12, offsets (1,14,27).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60"
     font-family="'Times New Roman', 'CMU Serif', Georgia, serif"
     font-weight="bold"
     style="background:white">
  <rect x="0" y="0" width="260" height="60" fill="white" />

  <!-- Cell 1 (10..50) : all green -->
  <rect x="11" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="24" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="37" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="11" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="24" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="37" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="11" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="24" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="37" y="37" width="12" height="12" fill="#2e8b57" />

  <!-- Cell 2 (50..90) : all green -->
  <rect x="51" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="64" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="77" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="51" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="64" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="77" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="51" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="64" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="77" y="37" width="12" height="12" fill="#2e8b57" />

  <!-- Cell 3 (90..130) : C4 6G/3Y -->
  <rect x="91" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="104" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="117" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="91" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="104" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="117" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="91" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="104" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="117" y="37" width="12" height="12" fill="#2e8b57" />

  <!-- Cell 4 (130..170) : C5 3G/6Y -->
  <rect x="131" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="144" y="11" width="12" height="12" fill="#2e8b57" />
      <rect x="157" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="131" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="144" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="157" y="24" width="12" height="12" fill="#2e8b57" />
      <rect x="131" y="37" width="12" height="12" fill="#2e8b57" />
      <rect x="144" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="157" y="37" width="12" height="12" fill="#e8d810" />

  <!-- Cell 5 (170..210) : all yellow -->
  <rect x="171" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="184" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="197" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="171" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="184" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="197" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="171" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="184" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="197" y="37" width="12" height="12" fill="#e8d810" />

  <!-- Cell 6 (210..250) : all yellow -->
  <rect x="211" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="224" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="237" y="11" width="12" height="12" fill="#e8d810" />
      <rect x="211" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="224" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="237" y="24" width="12" height="12" fill="#e8d810" />
      <rect x="211" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="224" y="37" width="12" height="12" fill="#e8d810" />
      <rect x="237" y="37" width="12" height="12" fill="#e8d810" />

  <!-- Outer frame + per-cell dividers -->
  <rect x="10" y="10" width="240" height="40" fill="none" stroke="#888" stroke-width="1.5" />
  <line x1="50"  y1="10" x2="50"  y2="50" stroke="#888" stroke-width="1.2" />
  <line x1="90"  y1="10" x2="90"  y2="50" stroke="#888" stroke-width="1.2" />
  <line x1="130"  y1="10" x2="130"  y2="50" stroke="#888" stroke-width="1.2" />
  <line x1="170"  y1="10" x2="170"  y2="50" stroke="#888" stroke-width="1.2" />
  <line x1="210"  y1="10" x2="210"  y2="50" stroke="#888" stroke-width="1.2" />
</svg>
